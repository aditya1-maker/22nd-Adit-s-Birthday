<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adit's 22nd Magical Birthday Wishbook ✦</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            magic: {
              deep: '#0A0F1E',
              indigo: '#1E1040',
              purple: '#312E81',
              glow: '#5B21B6',
              gold: '#FBBF24',
              goldGlow: 'rgba(251, 191, 36, 0.35)',
              lavender: '#C4B5FD',
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts: Cinzel Decorative, Cinzel, EB Garamond, & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-magic-deep text-white selection:bg-magic-gold/30">

  <!-- Tombol Exit World - Dipindahkan ke level root body, z-index tinggi -->
  <div class="fixed top-6 left-6 z-[200]">
    <button id="exitWorldBtn" class="px-4 py-2 bg-magic-indigo/80 backdrop-blur-md border border-magic-lavender/20 rounded-full text-sm font-semibold text-white hover:bg-magic-purple transition-all duration-300">
      Exit World
    </button>
  </div>

  <!-- Tombol Gear/Admin & Music - Dipindahkan ke level root body, z-index tinggi -->
  <div class="fixed top-6 right-6 z-[200] flex items-center gap-3">
    <button id="gearBtn" class="p-3 bg-magic-indigo/80 backdrop-blur-md border border-magic-lavender/20 rounded-full hover:bg-magic-purple transition-all duration-300">
      <!-- Icon Gear (SVG) -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-magic-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </button>
    <button id="musicToggle" class="p-3 bg-magic-indigo/80 backdrop-blur-md border border-magic-lavender/20 rounded-full hover:bg-magic-purple transition-all duration-300">
      <!-- Icon Music -->
      <svg id="musicIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-magic-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
      </svg>
    </button>
  </div>

  <!-- Konten lainnya tetap sama -->
</body>
</html>
